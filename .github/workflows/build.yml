name: Build UE5 Project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build, Cook, and Package
        shell: cmd
        run: |
          "%ENGINE_PATH%" BuildCookRun ^
            -project="%GITHUB_WORKSPACE%\HiddenObjectGame\HiddenObjectGame.uproject" ^
            -noP4 ^
            -platform=Win64 ^
            -clientconfig=Development ^
            -cook ^
            -build ^
            -stage ^
            -pak ^
            -archive ^
            -archivedirectory="C:\actions-runner\_work\hidden-object-game\hidden-object-game\BuildOutput" ^
            -WarningsAsErrorsMode=None ^
            -utf8output
        env:
          ENGINE_PATH: Z:\Engine\Build\BatchFiles\RunUAT.bat
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiddenObjectGame-Win64
          path: C:\actions-runner\_work\hidden-object-game\hidden-object-game\BuildOutput
